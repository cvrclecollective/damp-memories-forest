<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damp Memories Forest</title>
    <script src="https://unpkg.com/@tldraw/tldraw@2.4.4/tldraw.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@tldraw/tldraw@2.4.4/tldraw.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0d1b13; color: #d1dad3; font-family: 'Nanum Myeongjo', serif; }
        #app { display: flex; width: 100vw; height: 100vh; }

        /* Sidebar */
        #sidebar {
            width: 300px;
            background: #111f16;
            border-right: 1px solid #2a4734;
            padding: 20px;
            z-index: 100; /* Keeps buttons on top */
            display: flex;
            flex-direction: column;
        }

        textarea {
            width: 100%;
            background: #0d1b13;
            border: 1px solid #2a4734;
            color: white;
            padding: 10px;
            margin: 15px 0;
            font-family: inherit;
        }

        .plant-btn {
            background: #2a4734;
            color: #a4c0ae;
            border: 1px solid #a4c0ae;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        /* The Forest Area */
        #forest-container { flex-grow: 1; position: relative; }

        /* Labels - We use pointer-events: none so they don't block the drawing */
        .labels {
            position: absolute;
            inset: 0;
            display: flex;
            pointer-events: none; 
            z-index: 5;
        }
        .label {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
            opacity: 0.3;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }

        /* The Board */
        .tldraw-zone { position: absolute; inset: 0; z-index: 10; }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <h2 style="font-size: 1rem; color: #a4c0ae;">DAMP MEMORIES</h2>
        <p style="font-size: 0.6rem; opacity: 0.6;">COLLECTIVE ARCHIVE</p>
        
        <textarea id="msg" rows="4" placeholder="Type a memory..."></textarea>
        <button class="plant-btn" onclick="plant()">PLANT TREE</button>

        <div style="margin-top: auto; font-size: 0.6rem; opacity: 0.4;">
            <p>1. Use the Arrow to move storms</p>
            <p>2. Use the Pencil to draw branches</p>
            <p>3. Use the Eraser to break things</p>
        </div>
    </div>

    <div id="forest-container">
        <div class="labels">
            <div class="label">WET ZONE</div>
            <div class="label">OPEN FIELD</div>
            <div class="label">SHADOW AREA</div>
        </div>
        <div id="my-board" class="tldraw-zone"></div>
    </div>
</div>

<script>
    // This creates a shared room so everyone sees the same forest
    const id = "damp-forest-final-v100";
    
    const board = new tldraw.Tldraw(document.getElementById('my-board'), {
        roomId: id,
        onMount: (ed) => {
            window.editor = ed;
            ed.updateInstanceState({ isDarkMode: true });
            
            // Seed initial examples if empty
            setTimeout(() => {
                if (ed.getShapeIdsInPage(ed.getCurrentPageId()).size < 2) {
                    seed();
                }
            }, 1000);
        }
    });

    function plant() {
        const val = document.getElementById('msg').value || "memory";
        const x = 200 + Math.random() * 400;
        const y = 300 + Math.random() * 300;
        makeTree(x, y, val, Date.now());
        document.getElementById('msg').value = "";
    }

    function makeTree(x, y, txt, time) {
        window.editor.createShapes([
            { id: `t-${time}`, type: 'draw', x: x, y: y, props: { segments: [{ points: [{ x: 0, y: 0 }, { x: 5, y: -100 }] }], color: 'grey' } },
            { id: `s-${time}`, type: 'draw', x: x - 40, y: y - 130, props: { segments: [{ points: [{ x: 0, y: 20 }, { x: 40, y: 0 }, { x: 80, y: 20 }, { x: 40, y: 40 }, { x: 0, y: 20 }] }], color: 'green', fill: 'semi' } },
            { id: `m-${time}`, type: 'text', x: x - 30, y: y - 160, props: { text: txt, color: 'grey', size: 'm' } }
        ]);
    }

    function seed() {
        makeTree(200, 400, "coffee cooled", "s1");
        makeTree(500, 300, "empty room", "s2");
        makeTree(800, 500, "unspoken", "s3");
    }
</script>
</body>
</html>
