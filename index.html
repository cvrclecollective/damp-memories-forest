<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damp Memories Forest</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    font-family: sans-serif;
  }

  canvas {
    display: block;
  }

  .label {
    position: absolute;
    top: 10px;
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    pointer-events: none;
  }

  #wet { right: 20px; }
  #open { left: 50%; transform: translateX(-50%); }
  #shadow { left: 20px; }
</style>
</head>

<body>

<div id="shadow" class="label">Shadow</div>
<div id="open" class="label">Open</div>
<div id="wet" class="label">Wet</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const zones = {
  shadow: { x: 0, w: canvas.width / 3 },
  open:   { x: canvas.width / 3, w: canvas.width / 3 },
  wet:    { x: (canvas.width / 3) * 2, w: canvas.width / 3 }
};

let objects = [];

// Pre-seeded examples
objects.push(
  { x: 100, y: 300, zone: "shadow", type: "tree" },
  { x: 500, y: 250, zone: "open", type: "tree" },
  { x: 1000, y: 350, zone: "wet", type: "tree" }
);

function getZone(x) {
  if (x < zones.open.x) return "shadow";
  if (x < zones.wet.x) return "open";
  return "wet";
}

function drawZones() {
  ctx.fillStyle = "#1e1e1e";
  ctx.fillRect(0, 0, zones.shadow.w, canvas.height);

  ctx.fillStyle = "#2a2a2a";
  ctx.fillRect(zones.open.x, 0, zones.open.w, canvas.height);

  ctx.fillStyle = "#263238";
  ctx.fillRect(zones.wet.x, 0, zones.wet.w, canvas.height);
}

function drawTree(obj) {
  ctx.beginPath();
  ctx.arc(obj.x, obj.y, 8, 0, Math.PI * 2);

  if (obj.zone === "shadow") ctx.fillStyle = "rgba(200,200,200,0.4)";
  if (obj.zone === "open") ctx.fillStyle = "rgba(220,220,220,0.6)";
  if (obj.zone === "wet") ctx.fillStyle = "rgba(180,200,255,0.5)";

  ctx.fill();
}

function render() {
  drawZones();
  objects.forEach(drawTree);
}

canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const zone = getZone(x);

  objects.push({
    x,
    y,
    zone,
    type: "tree"
  });

  render();
});

render();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  render();
});
</script>

</body>
</html>
