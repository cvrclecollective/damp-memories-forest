<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damp Memories Forest</title>
    <script src="https://unpkg.com/@tldraw/tldraw/tldraw.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@tldraw/tldraw/tldraw.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Nanum Myeongjo', serif; }
        #app-container { display: flex; width: 100vw; height: 100vh; background: #0d1b13; }

        #sidebar {
            width: 300px;
            background: #111f16;
            border-right: 1px solid #1a2f22;
            padding: 25px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            color: #d1dad3;
        }

        h1 { font-size: 1.1rem; color: #a4c0ae; margin-bottom: 5px; }
        .subtitle { font-size: 0.55rem; letter-spacing: 1px; opacity: 0.6; margin-bottom: 25px; }

        textarea {
            width: 100%;
            background: #0d1b13;
            border: 1px solid #2a4734;
            color: #d1dad3;
            padding: 10px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .btn {
            background: #2a4734;
            color: #a4c0ae;
            border: 1px solid #a4c0ae;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
            font-family: inherit;
        }

        #canvas-container { flex: 1; position: relative; }

        .zones-bg {
            position: absolute;
            inset: 0;
            display: flex;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .zone {
            flex: 1;
            border-right: 1px dashed rgba(164, 192, 174, 0.1);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
            font-size: 0.7rem;
            color: #a4c0ae;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="sidebar">
        <h1>Damp Memories Forest</h1>
        <div class="subtitle">COLLECTIVE ARCHIVE</div>
        
        <label style="font-size: 0.7rem; margin-bottom: 5px;">ADD A MEMORY</label>
        <textarea id="memory-input" rows="3" placeholder="write here..."></textarea>
        
        <button class="btn" onclick="addTree()">PLANT NEW TREE</button>

        <div style="margin-top: 40px; font-size: 0.65rem; opacity: 0.5; line-height: 1.6;">
            <p>| Move a <b>Storm</b> from a tree</p>
            <p>| Use the <b>Eraser</b> to break a branch</p>
            <p>| Use the <b>Pencil</b> to repair it</p>
        </div>
    </div>

    <div id="canvas-container">
        <div class="zones-bg">
            <div class="zone">WET ZONE</div>
            <div class="zone">OPEN FIELD</div>
            <div class="zone">SHADOW AREA</div>
        </div>
        <div id="tldraw-mount" style="width: 100%; height: 100%;"></div>
    </div>
</div>

<script>
    const ROOM_ID = "damp-forest-collective-final-v2";
    const mount = document.getElementById('tldraw-mount');
    
    const app = new tldraw.Tldraw(mount, {
        roomId: ROOM_ID,
        onMount: (editor) => {
            window.editor = editor;
            // When the board loads, check if it's empty. If so, seed it.
            setTimeout(() => {
                if (editor.getShapeIdsInPage(editor.getCurrentPageId()).size < 5) {
                    seedForest();
                }
            }, 500);
        }
    });

    // Helper to create the moveable tree components
    function createTreeParts(x, y, text, idBase) {
        return [
            {
                id: `trunk-${idBase}`,
                type: 'draw', x: x, y: y,
                props: { segments: [{ points: [{ x: 0, y: 0 }, { x: 8, y: -110 }] }], color: 'grey', size: 'm' }
            },
            {
                id: `storm-${idBase}`,
                type: 'draw', x: x - 45, y: y - 145,
                props: { segments: [{ points: [{ x: 0, y: 20 }, { x: 40, y: 0 }, { x: 90, y: 20 }, { x: 50, y: 50 }, { x: 0, y: 20 }] }], color: 'green', fill: 'semi', size: 'xl' }
            },
            {
                id: `text-${idBase}`,
                type: 'text', x: x - 35, y: y - 180,
                props: { text: text, color: 'grey', font: 'draw', size: 'm' }
            }
        ];
    }

    function addTree() {
        const text = document.getElementById('memory-input').value || "unspoken";
        const x = 300 + Math.random() * 600;
        const y = 300 + Math.random() * 300;
        window.editor.createShapes(createTreeParts(x, y, text, Date.now()));
        document.getElementById('memory-input').value = '';
    }

    // THIS INSERTS YOUR EXAMPLES AUTOMATICALLY
    function seedForest() {
        const examples = [
            { x: 200, y: 400, text: "she left before the coffee cooled" },
            { x: 150, y: 650, text: "something that never dried" },
            { x: 550, y: 350, text: "the sound of an empty room" },
            { x: 600, y: 600, text: "I keep the window slightly open" },
            { x: 950, y: 450, text: "the part I didn't say out loud" }
        ];
        
        examples.forEach((ex, i) => {
            window.editor.createShapes(createTreeParts(ex.x, ex.y, ex.text, `seed-${i}`));
        });
    }
</script>
</body>
</html>
