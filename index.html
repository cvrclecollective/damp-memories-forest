<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Damp Memories Forest</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    overflow: hidden;
  }

  #toolbar {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    border-radius: 8px;
    color: white;
    z-index: 10;
  }

  button {
    margin: 2px;
    padding: 6px 10px;
    cursor: pointer;
  }

  input {
    margin-top: 5px;
    width: 180px;
  }

  canvas {
    display: block;
  }
</style>
</head>

<body>

<div id="toolbar">
  <div>
    <button onclick="setTool('write')">Write</button>
    <button onclick="setTool('draw')">Draw</button>
    <button onclick="setTool('tree')">Tree</button>
    <button onclick="setTool('storm')">Storm</button>
    <button onclick="setTool('erase')">Erase</button>
  </div>
  <input id="textInput" placeholder="Type a sentence..." />
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let tool = "write";
let objects = [];
let drawing = false;
let currentStroke = [];

function setTool(t) {
  tool = t;
}

// Zones
function getZone(x) {
  const w = canvas.width / 4;
  if (x < w) return "shadow";
  if (x < w * 2) return "grey";
  if (x < w * 3) return "blue";
  return "white";
}

// Background zones
function drawZones() {
  const w = canvas.width / 4;

  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, w, canvas.height);

  ctx.fillStyle = "#444";
  ctx.fillRect(w, 0, w, canvas.height);

  ctx.fillStyle = "#2a4a6a";
  ctx.fillRect(w * 2, 0, w, canvas.height);

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(w * 3, 0, w, canvas.height);
}

// Rendering objects
function renderObjects() {
  objects.forEach(obj => {
    if (obj.type === "text") {
      ctx.fillStyle = obj.color;
      ctx.font = "16px sans-serif";
      ctx.fillText(obj.text, obj.x, obj.y);
    }

    if (obj.type === "tree") {
      ctx.beginPath();
      ctx.arc(obj.x, obj.y, 8, 0, Math.PI * 2);
      ctx.fillStyle = "green";
      ctx.fill();
    }

    if (obj.type === "storm") {
      ctx.beginPath();
      ctx.arc(obj.x, obj.y, 15, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(200,200,255,0.6)";
      ctx.stroke();
    }

    if (obj.type === "stroke") {
      ctx.beginPath();
      obj.points.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      });
      ctx.strokeStyle = "black";
      ctx.stroke();
    }
  });
}

// Main render
function render() {
  drawZones();
  renderObjects();
}

canvas.addEventListener("mousedown", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if (tool === "draw") {
    drawing = true;
    currentStroke = [{ x, y }];
  }

  if (tool === "write") {
    const text = document.getElementById("textInput").value;
    if (!text) return;

    objects.push({
      type: "text",
      x,
      y,
      text,
      zone: getZone(x),
      color: "black"
    });
  }

  if (tool === "tree") {
    objects.push({
      type: "tree",
      x,
      y,
      zone: getZone(x)
    });
  }

  if (tool === "storm") {
    objects.push({
      type: "storm",
      x,
      y,
      zone: getZone(x)
    });
  }

  if (tool === "erase") {
    objects = objects.filter(obj => {
      const dx = obj.x - x;
      const dy = obj.y - y;
      return Math.sqrt(dx*dx + dy*dy) > 20;
    });
  }

  render();
});

canvas.addEventListener("mousemove", (e) => {
  if (!drawing) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  currentStroke.push({ x, y });
  render();
});

canvas.addEventListener("mouseup", () => {
  if (drawing) {
    objects.push({
      type: "stroke",
      points: currentStroke
    });
    drawing = false;
    currentStroke = [];
  }
});

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  render();
});

render();
</script>

</body>
</html>
