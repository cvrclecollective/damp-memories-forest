<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damp Memories Forest</title>
    <script src="https://unpkg.com/@tldraw/tldraw/tldraw.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@tldraw/tldraw/tldraw.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Nanum Myeongjo', serif; }
        
        #app-container { display: flex; width: 100vw; height: 100vh; background: #0d1b13; }

        /* SIDEBAR */
        #sidebar {
            width: 300px;
            background: #111f16;
            border-right: 1px solid #1a2f22;
            padding: 25px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            color: #d1dad3;
        }

        h1 { font-size: 1.1rem; color: #a4c0ae; margin-bottom: 5px; }
        .subtitle { font-size: 0.55rem; letter-spacing: 1px; opacity: 0.6; margin-bottom: 25px; }

        textarea {
            width: 100%;
            background: #0d1b13;
            border: 1px solid #2a4734;
            color: #d1dad3;
            padding: 10px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .btn {
            background: #2a4734;
            color: #a4c0ae;
            border: 1px solid #a4c0ae;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
        }

        /* CANVAS */
        #canvas-container { flex: 1; position: relative; }

        /* ZONE LABELS */
        .zones-bg {
            position: absolute;
            inset: 0;
            display: flex;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .zone {
            flex: 1;
            border-right: 1px dashed rgba(164, 192, 174, 0.1);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
            font-size: 0.7rem;
            color: #a4c0ae;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="sidebar">
        <h1>Damp Memories Forest</h1>
        <div class="subtitle">COLLECTIVE ARCHIVE</div>
        
        <label style="font-size: 0.7rem; margin-bottom: 5px;">ADD A MEMORY</label>
        <textarea id="memory-input" rows="3" placeholder="write here..."></textarea>
        
        <button class="btn" onclick="addTree()">PLANT NEW TREE</button>
        <button class="btn" onclick="addStorm()" style="background: transparent;">ADD EXTRA STORM</button>

        <div style="margin-top: 40px; font-size: 0.65rem; opacity: 0.5; line-height: 1.6;">
            <p>| Use the Eraser to break branches</p>
            <p>| Use the Pencil to repair them</p>
            <p>| Move storms to other trees</p>
        </div>
    </div>

    <div id="canvas-container">
        <div class="zones-bg">
            <div class="zone">WET ZONE</div>
            <div class="zone">OPEN FIELD</div>
            <div class="zone">SHADOW AREA</div>
        </div>
        <div id="tldraw-mount" style="width: 100%; height: 100%;"></div>
    </div>
</div>

<script>
    // 🔗 THE MULTIPLAYER SECRET:
    // By adding a "room" name to the URL, everyone enters the same space.
    const ROOM_ID = "damp-forest-collective-room-1";
    
    const mount = document.getElementById('tldraw-mount');
    
    // Initialize the shared board
    const app = new tldraw.Tldraw(mount, {
        roomId: ROOM_ID,
        onMount: (editor) => {
            window.editor = editor;
            editor.updateInstanceState({ isDebugMode: false });
        }
    });

    function addTree() {
        const text = document.getElementById('memory-input').value || "unspoken";
        const x = 400 + Math.random() * 200;
        const y = 300 + Math.random() * 200;

        // 1. Add the Trunk (Moveable Line)
        window.editor.createShapes([
            {
                id: `trunk-${Date.now()}`,
                type: 'draw',
                x: x,
                y: y,
                props: {
                    segments: [{ points: [{ x: 0, y: 0 }, { x: 5, y: -100 }] }],
                    color: 'grey',
                    size: 'm'
                }
            },
            // 2. Add the Storm (Moveable Cloud)
            {
                id: `storm-${Date.now()}`,
                type: 'draw',
                x: x - 40,
                y: y - 130,
                props: {
                    segments: [{ points: [{ x: 0, y: 0 }, { x: 80, y: 0 }, { x: 40, y: -40 }, { x: 0, y: 0 }] }],
                    color: 'green',
                    fill: 'semi',
                    size: 'xl'
                }
            },
            // 3. Add the Text
            {
                id: `text-${Date.now()}`,
                type: 'text',
                x: x - 30,
                y: y - 160,
                props: {
                    text: text,
                    color: 'grey',
                    font: 'draw',
                    size: 'm'
                }
            }
        ]);
        document.getElementById('memory-input').value = '';
    }

    function addStorm() {
        window.editor.createShapes([{
            id: `extra-storm-${Date.now()}`,
            type: 'draw',
            x: 500,
            y: 300,
            props: {
                segments: [{ points: [{ x: 0, y: 0 }, { x: 50, y: 20 }, { x: 100, y: 0 }] }],
                color: 'green',
                fill: 'pattern',
                size: 'xl'
            }
        }]);
    }
</script>
</body>
</html>
