<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damp Memories Forest</title>

<style>
body {
    margin: 0;
    font-family: serif;
    background: #0b140f;
    color: #d6e2da;
}

/* LAYOUT */
#app {
    display: flex;
    height: 100vh;
}

/* LEFT: FOREST */
#forest {
    flex: 3;
    display: flex;
}

/* ZONES */
.zone {
    flex: 1;
    position: relative;
    border-right: 1px solid rgba(255,255,255,0.05);
    padding: 10px;
}

.zone-title {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 0.7rem;
    opacity: 0.5;
}

/* COLORS */
#wet { background: #0a1a12; }
#open { background: #10241a; }
#shadow { background: #06110c; }

/* RIGHT: WHITE CREATION AREA */
#creator {
    flex: 1;
    background: #ffffff;
    color: black;
    display: flex;
    flex-direction: column;
    padding: 15px;
}

/* INPUT */
textarea {
    width: 100%;
    height: 100px;
    margin-bottom: 10px;
}

/* BUTTON */
button {
    padding: 10px;
    cursor: pointer;
}

/* TREE OBJECT */
.tree {
    position: absolute;
    padding: 10px 14px;
    border-radius: 50px;
    cursor: grab;
    font-size: 0.8rem;
    max-width: 150px;
    word-wrap: break-word;
}

/* VISUAL PER ZONE */
.wet-tree {
    background: rgba(180, 220, 200, 0.15);
    backdrop-filter: blur(4px);
}

.open-tree {
    background: rgba(200, 255, 220, 0.3);
}

.shadow-tree {
    background: rgba(200, 200, 200, 0.1);
    opacity: 0.6;
}

/* WHITE AREA TREES */
.creator-tree {
    background: #eee;
    color: black;
    position: relative;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="app">

    <!-- FOREST -->
    <div id="forest">
        <div id="wet" class="zone" ondragover="allowDrop(event)" ondrop="drop(event, 'wet')">
            <div class="zone-title">WET ZONE</div>
        </div>

        <div id="open" class="zone" ondragover="allowDrop(event)" ondrop="drop(event, 'open')">
            <div class="zone-title">OPEN FIELD</div>
        </div>

        <div id="shadow" class="zone" ondragover="allowDrop(event)" ondrop="drop(event, 'shadow')">
            <div class="zone-title">SHADOW AREA</div>
        </div>
    </div>

    <!-- CREATOR -->
    <div id="creator">
        <h3>DAMP MEMORIES</h3>
        <textarea id="textInput" placeholder="write what never dried..."></textarea>
        <button onclick="createTree()">Create Memory</button>

        <div id="staging"></div>
    </div>

</div>

<script>

let counter = 0;

// CREATE TREE IN WHITE AREA
function createTree() {
    const text = document.getElementById('textInput').value;
    if (!text) return;

    const tree = document.createElement('div');
    tree.className = 'tree creator-tree';
    tree.innerText = text;
    tree.draggable = true;

    tree.id = "tree-" + counter++;

    tree.ondragstart = (e) => {
        e.dataTransfer.setData("text/plain", tree.id);
    };

    document.getElementById('staging').appendChild(tree);
    document.getElementById('textInput').value = '';
}

// ALLOW DROP
function allowDrop(ev) {
    ev.preventDefault();
}

// DROP INTO ZONE
function drop(ev, zone) {
    ev.preventDefault();
    const id = ev.dataTransfer.getData("text");
    const tree = document.getElementById(id);

    const clone = tree.cloneNode(true);
    clone.style.position = "absolute";
    clone.style.left = ev.offsetX + "px";
    clone.style.top = ev.offsetY + "px";

    clone.classList.remove("creator-tree");

    if (zone === "wet") clone.classList.add("wet-tree");
    if (zone === "open") clone.classList.add("open-tree");
    if (zone === "shadow") clone.classList.add("shadow-tree");

    clone.draggable = true;
    clone.ondragstart = (e) => {
        e.dataTransfer.setData("text/plain", clone.id);
    };

    ev.target.appendChild(clone);
}

</script>

</body>
</html>
