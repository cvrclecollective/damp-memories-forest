<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damp Memories Forest</title>
    <script src="https://unpkg.com/@tldraw/tldraw/tldraw.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@tldraw/tldraw/tldraw.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0d1b13; font-family: 'Nanum Myeongjo', serif; }
        
        #app-container { display: flex; width: 100vw; height: 100vh; }

        /* Sidebar Styling */
        #sidebar {
            width: 300px;
            background: #111f16;
            border-right: 1px solid #1a2f22;
            padding: 25px;
            display: flex;
            flex-direction: column;
            z-index: 100;
            color: #d1dad3;
            flex-shrink: 0;
        }

        h1 { font-size: 1.1rem; color: #a4c0ae; margin-bottom: 5px; }
        .subtitle { font-size: 0.55rem; letter-spacing: 1px; opacity: 0.6; margin-bottom: 25px; }

        textarea {
            width: 100%;
            background: #0d1b13;
            border: 1px solid #2a4734;
            color: #d1dad3;
            padding: 10px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .btn {
            background: #2a4734;
            color: #a4c0ae;
            border: 1px solid #a4c0ae;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
            font-family: inherit;
            transition: 0.2s;
        }
        .btn:hover { background: #365c43; }

        /* Canvas Area */
        #canvas-wrapper { flex-grow: 1; position: relative; height: 100%; background: #0d1b13; }
        
        /* Zone Background (Behind everything) */
        .zones-layer {
            position: absolute;
            inset: 0;
            display: flex;
            pointer-events: none;
            z-index: 0;
        }
        .zone {
            flex: 1;
            border-right: 1px solid rgba(164, 192, 174, 0.05);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 30px;
            font-size: 0.65rem;
            color: #a4c0ae;
            letter-spacing: 2px;
            opacity: 0.4;
        }

        /* The actual tldraw container */
        .tldraw-container { position: absolute; inset: 0; z-index: 1; }

        /* Making tldraw UI blend with our dark theme */
        .tl-container { background: transparent !important; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="sidebar">
        <h1>Damp Memories Forest</h1>
        <div class="subtitle">COLLECTIVE ARCHIVE</div>
        
        <label style="font-size: 0.7rem; margin-bottom: 8px; display: block; opacity: 0.8;">YOUR MEMORY</label>
        <textarea id="memory-input" rows="4" placeholder="write what never dried..."></textarea>
        
        <button class="btn" onclick="addTree()">PLANT NEW TREE</button>

        <div style="margin-top: auto; font-size: 0.65rem; opacity: 0.5; line-height: 1.8; border-top: 1px solid #1a2f22; padding-top: 20px;">
            <p>| Use the <b>Arrow</b> to move storms</p>
            <p>| Use the <b>Eraser</b> to break branches</p>
            <p>| Use the <b>Pencil</b> to repair growth</p>
        </div>
    </div>

    <div id="canvas-wrapper">
        <div class="zones-layer">
            <div class="zone">WET ZONE</div>
            <div class="zone">OPEN FIELD</div>
            <div class="zone">SHADOW AREA</div>
        </div>
        <div id="tldraw-mount" class="tldraw-container"></div>
    </div>
</div>

<script>
    // New Room ID to force a fresh session
    const ROOM_ID = "damp-forest-shared-v3";
    const mount = document.getElementById('tldraw-mount');
    
    // Create the editor
    const app = new tldraw.Tldraw(mount, {
        roomId: ROOM_ID,
        onMount: (editor) => {
            window.editor = editor;
            
            // Set dark mode and hide unwanted UI for atmosphere
            editor.updateInstanceState({ isDarkMode: true });

            // Check if we need to add the initial example trees
            setTimeout(() => {
                const shapes = editor.getShapeIdsInPage(editor.getCurrentPageId());
                if (shapes.size < 3) {
                    seedForest();
                }
            }, 800);
        }
    });

    function createTreeShapes(x, y, text, idBase) {
        return [
            // The Trunk
            {
                id: `trunk-${idBase}`, type: 'draw', x: x, y: y,
                props: { segments: [{ points: [{ x: 0, y: 0 }, { x: 5, y: -120 }] }], color: 'grey', size: 'm' }
            },
            // The Storm Canopy
            {
                id: `storm-${idBase}`, type: 'draw', x: x - 50, y: y - 160,
                props: { segments: [{ points: [{ x: 0, y: 30 }, { x: 30, y: 0 }, { x: 70, y: 0 }, { x: 100, y: 30 }, { x: 50, y: 60 }, { x: 0, y: 30 }] }], color: 'green', fill: 'semi', size: 'xl' }
            },
            // The Text
            {
                id: `text-${idBase}`, type: 'text', x: x - 40, y: y - 210,
                props: { text: text, color: 'grey', font: 'draw', size: 'm' }
            }
        ];
    }

    function addTree() {
        const text = document.getElementById('memory-input').value || "unspoken";
        const x = 300 + Math.random() * 500;
        const y = 400 + Math.random() * 300;
        window.editor.createShapes(createTreeShapes(x, y, text, Date.now()));
        document.getElementById('memory-input').value = '';
    }

    function seedForest() {
        const examples = [
            { x: 250, y: 500, text: "she left before the coffee cooled" },
            { x: 600, y: 400, text: "the sound of an empty room" },
            { x: 900, y: 600, text: "the part I didn't say out loud" }
        ];
        
        examples.forEach((ex, i) => {
            window.editor.createShapes(createTreeShapes(ex.x, ex.y, ex.text, `seed-${i}`));
        });
    }
</script>
</body>
</html>
